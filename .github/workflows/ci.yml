name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (format, CSS, JS, HTML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Prettier (format check)
        run: npm run format:check
      - name: Stylelint (CSS)
        run: npm run lint:css
      - name: ESLint (JS)
        run: npm run lint:js
      - name: html-validate (HTML)
        run: npm run lint:html

  lighthouse:
    name: Lighthouse (homepage)
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 26
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
