# user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;
#Provides the configuration file context in which the directives that affect connection processing are specified.
events {
    # Sets the maximum number of simultaneous connections that can be opened by a worker process.
    worker_connections 9999;
    # Tells the worker to accept multiple connections at a time
    multi_accept on;
}
http {
    # Устанавливаю максимальный размер загружаемых данных
    client_max_body_size 230M;

    # what times to include
    include /etc/nginx/mime.types;
    # what is the default one
    default_type application/octet-stream;
    # Sets the path, format, and configuration for a buffered log write
    log_format compression '$remote_addr - $remote_user [$time_local] '
        '"$request" $status $upstream_addr '
        '"$http_referer" "$http_user_agent"';

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    # Только современные протоколы: TLSv1/1.1 устарели и небезопасны.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    # Кэш TLS-сессий ускоряет повторные подключения; tickets off — форвард-секретность.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Сжатие. text/html сжимается всегда по умолчанию; остальные типы — явно.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/xml+rss application/rss+xml application/atom+xml
        application/manifest+json application/wasm
        image/svg+xml font/ttf font/otf application/vnd.ms-fontobject;

    include /etc/nginx/conf.d/*.conf;
    # Загружаю обработчики адресов
    include /etc/nginx/sites-enabled/*;
}
